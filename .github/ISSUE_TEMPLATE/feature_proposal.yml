name: Feature proposal
title: "[Feature]: "
type: feature
body:

  - type: textarea
    id: proposal
    attribute:
      label: Proposal
      placeholder: Use this section to explain the feature and how it will work. 
        It can be helpful to add technical details, design proposals, and links 
        to related issues. 
    validations:
      required: true

  - type: textarea
    id: success-validation
    attribute:
      label: What does success look like, and how can we measure that?
    validations:
      required: true

